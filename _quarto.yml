project:
  type: website
  output-dir: _render
  render:
    - "*.qmd"
    - "!handouts/exercises_Day3_answer.qmd"
website:
  cookie-consent:
    type: express
    style: simple
    palette: dark
  google-analytics:
    tracking-id: "G-3EXJ6W4CBC"
    anonymize-ip: true
  title: "OUCRU introduction to Medical Statistics"
  favicon: "site_imgs/OUCRU.jpg"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: handouts/medical_statistics_2024.qmd 
        text: OUCRU Medical Statistics Course Videos
      - href: https://oucru-modelling.github.io/R-training-2025/
        text: Previous R training course
        
    right:
      - icon: envelope
        aria-label: email
        href: "mailto:hungtt@oucru.org"
        target: _blank
  comments:
    giscus:
      repo: "TranHung93/Introduction-to-Medical-Statistics"
      repo-id: "R_kgDORlzZ2Q"
      category: General
      category-id: "DIC_kwDORlzZ2c4C4qDV"
      mapping: pathname
      reactions-enabled: true
      loading: lazy
      input-position: top
      theme: light # You can also use 'dark' or 'auto'
      

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">&#169; 2026 Tran Thai Hung and the Biostatistics group <br></span>
      <span class="faux-block">All content licensed under<br>[Creative Commons CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)</span>
    center: |
     
    right: |
      <span class="faux-block"><a href="https://github.com/TranHung93/Introduction-to-Medical-Statistics">View source on GitHub</a></span>

toc: true
number-sections: true

execute: 
  echo: true

format:
  html:
    theme: cosmo
  revealjs:
    css: ../styles.css